name: Bug Report
description: File a bug report to help us improve XSearch
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Please provide a clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Please provide the exact commands or code snippets to reproduce the behavior.
      placeholder: |
        1. Run command 'python run.py --do_train ...'
        2. See error...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment Information
      description: Please provide details about your hardware and software environment.
      value: |
        - OS: [e.g., Ubuntu 20.04]
        - Python version: [e.g., 3.8]
        - PyTorch version: 
        - Transformers version:
        - CUDA version: 
    validations:
      required: true