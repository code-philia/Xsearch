name: Feature Request
description: Suggest an idea or enhancement for XSearch
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is. (e.g., "I'm always frustrated when...")
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Describe the solution you'd like
      description: A clear and concise description of what you want to happen or the feature you want to be implemented.
    validations:
      required: true